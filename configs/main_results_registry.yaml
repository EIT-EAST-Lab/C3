# configs/main_results_registry.yaml
# Central registry for paper main results.
#
# Each run corresponds to:
#   - a method (SFT / MAPPO / MAGRPO / C3)
#   - a task (math / code)
#   - a seed (0..4)  [required by c3.tools.main_results]
#   - a source:
#       - hf_base: a HuggingFace model id (SFT baseline)
#       - train_run_dir: a local run directory produced by scripts/reproduce/paper_train.sh
#
# The main-results sweep script will produce:
#   <run_root>/<out_subdir>/<task>/<profile>/{eval_only.jsonl, eval_only.jsonl.metrics.jsonl}
#
# Notes
# - We do NOT ship checkpoints.
# - SFT baseline uses hf_base and writes eval artifacts to:
#     <ckpt_root>/_runs/_sft_main_results/<run_id>/...
# - RL-trained methods use train_run_dir and write eval artifacts under that directory.

version: 1
defaults:
  # Where to write per-run eval artifacts under the run directory.
  out_subdir: "main_results"
  # Profiles to run by default for each run.
  #   greedy: temperature=0, n=1
  #   n10:    temperature=0.7, n=10  -> P@1 / P@10
  profiles: ["greedy", "n10"]
  # Extra eval args appended verbatim to openrlhf CLI call.
  extra_eval_args: ""

runs:
  # ------------------ SFT baseline (no training required) ------------------
  # Paper-aligned default bases:
  #   - math: Qwen/Qwen2.5-3B-Instruct
  #   - code: Qwen/Qwen2.5-Coder-3B-Instruct
  # We expand SFT to 5 pseudo-seeds so that strict aggregation (expected_runs=5)
  # passes without special flags.

  - id: "paper_SFT_math_seed0"
    method: "SFT"
    task: "math"
    seed: 0
    alg_for_eval: "none"
    source:
      type: "hf_base"
      hf_base: "Qwen/Qwen2.5-3B-Instruct"

  - id: "paper_SFT_math_seed1"
    method: "SFT"
    task: "math"
    seed: 1
    alg_for_eval: "none"
