      type: "hf_base"
      hf_base: "Qwen/Qwen2.5-3B-Instruct"

  - id: "paper_SFT_math_seed2"
    method: "SFT"
    task: "math"
    seed: 2
    alg_for_eval: "none"
    source:
      type: "hf_base"
      hf_base: "Qwen/Qwen2.5-3B-Instruct"

  - id: "paper_SFT_math_seed3"
    method: "SFT"
    task: "math"
    seed: 3
    alg_for_eval: "none"
    source:
      type: "hf_base"
      hf_base: "Qwen/Qwen2.5-3B-Instruct"

  - id: "paper_SFT_math_seed4"
    method: "SFT"
    task: "math"
    seed: 4
