name: pre-release-audit

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
      uses: actions/checkout@v4

      - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

      - name: Run pre-release audit
      run: |
        bash scripts/audit/pre_release.sh
